name: Terraform CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # =====================
  # 🔹 VALIDATE STAGE
  # =====================
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform -chdir=envs/dev init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Format Check
        run: terraform -chdir=envs/dev fmt -check

      - name: Validate
        run: terraform -chdir=envs/dev validate


  # =====================
  # 🔹 PLAN STAGE
  # =====================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform -chdir=envs/dev init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 🔥 IMPORTANT: create plan file in root of working dir
      - name: Create Plan
        run: terraform -chdir=envs/dev plan -out=tfplan

      # 🔍 Debug step (VERY IMPORTANT)
      - name: Verify Plan File Exists
        run: ls -lh

      # 📦 Upload artifact
      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan


  # =====================
  # 🔹 APPLY STAGE (WITH APPROVAL)
  # =====================
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan

    # 🔐 GitHub approval gate
    environment:
      name: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 📥 Download plan
      - name: Download tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform -chdir=envs/dev init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 🚀 Apply
      - name: Apply Terraform
        run: terraform -chdir=envs/dev apply -auto-approve tfplan